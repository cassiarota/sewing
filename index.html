<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>踩缝纫机</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./style.css?v=14" />
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <h1>踩缝纫机</h1>
        <div class="stat-strip" aria-live="polite">
          <div>
            <span>得分</span>
            <strong id="scoreText">0</strong>
          </div>
          <div>
            <span>进度</span>
            <strong id="progressText">0%</strong>
          </div>
        </div>
      </header>

      <section class="stage-wrap" aria-label="踩缝纫机游戏">
        <canvas id="gameCanvas" width="1280" height="760"></canvas>
        <div class="pedal-controls" aria-label="脚踏板控制">
          <button class="pedal-key" data-pedal="KeyJ" type="button" aria-label="踩左踏板，J键">
            <span>左踏板</span>
            <small>J键</small>
          </button>
          <button class="pedal-key" data-pedal="KeyK" type="button" aria-label="踩右踏板，K键">
            <span>右踏板</span>
            <small>K键</small>
          </button>
        </div>
        <div id="modalOverlay" class="modal-overlay" aria-hidden="false">
          <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <h2 id="modalTitle">踩缝纫机</h2>
            <div class="modal-copy">
              <p id="modalMessage">按 WASD 移动布料，按 J / K 踩踏板。</p>
              <p id="modalScoringHint">沿着划定的线进行缝纫，偏离越多分数越低。</p>
            </div>
            <div class="modal-actions">
              <button id="startBtn" type="button">开始游戏</button>
              <button id="exitBtn" type="button" hidden>退出游戏</button>
              <button id="nextBtn" type="button" hidden>下一关</button>
            </div>
          </div>
        </div>
        <div id="leaderboardOverlay" class="leaderboard-overlay hidden" aria-hidden="true">
          <div
            class="leaderboard-card"
            role="dialog"
            aria-modal="true"
            aria-labelledby="leaderboardTitle"
          >
            <h2 id="leaderboardTitle">排行榜</h2>
            <p id="leaderboardMessage">正在读取 Top 100…</p>
            <form id="leaderboardForm" class="leaderboard-form" hidden>
              <label for="playerName">你的名字</label>
              <div>
                <input
                  id="playerName"
                  name="playerName"
                  type="text"
                  maxlength="20"
                  autocomplete="nickname"
                  placeholder="留空则为匿名用户"
                />
                <button id="leaderboardSubmitBtn" type="submit">确认上榜</button>
              </div>
            </form>
            <div class="leaderboard-heading" aria-hidden="true">
              <span>名次</span>
              <span>玩家</span>
              <span>得分</span>
            </div>
            <ol id="leaderboardRows" class="leaderboard-rows" aria-label="排行榜"></ol>
            <button id="leaderboardReturnBtn" type="button" hidden>返回主界面</button>
          </div>
        </div>
      </section>
    </main>

    <script src="./game.js?v=23"></script>
  </body>
</html>
